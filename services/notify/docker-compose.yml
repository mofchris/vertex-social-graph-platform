services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notify
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    ports:
      - "5436:5432"   # 5436 on the host to avoid clashing with the other service DBs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  notify:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/notify
      DB_USERNAME: notify
      DB_PASSWORD: notify
      # MUST match the Identity service's APP_JWT_SECRET so tokens verify across services.
      APP_JWT_SECRET: change-me-in-prod-use-a-long-random-secret-0123456789
    ports:
      - "8084:8084"

volumes:
  pgdata:
