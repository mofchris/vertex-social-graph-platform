services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: graph
      POSTGRES_USER: graph
      POSTGRES_PASSWORD: graph
    ports:
      - "5434:5432"   # 5434 on the host to avoid clashing with identity/profile DBs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graph"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  graph:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/graph
      DB_USERNAME: graph
      DB_PASSWORD: graph
      # MUST match the Identity service's APP_JWT_SECRET so tokens verify across services.
      APP_JWT_SECRET: change-me-in-prod-use-a-long-random-secret-0123456789
    ports:
      - "8082:8082"

volumes:
  pgdata:
