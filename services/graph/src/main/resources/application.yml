server:
  # 8082 so Graph can run alongside Identity (8080) and Profile (8081).
  port: 8082

spring:
  application:
    name: graph
  # Default (dev) profile: in-memory H2 in PostgreSQL-compatibility mode (JDK only, no Docker).
  datasource:
    url: jdbc:h2:mem:graph;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    # MUST match the Identity service's secret so this service can verify its tokens.
    secret: ${APP_JWT_SECRET:dev-only-secret-change-me-please-min-32-bytes-long-0123456789}
    issuer: vertex-identity

---
# Postgres profile: used by docker-compose (SPRING_PROFILES_ACTIVE=postgres).
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/graph}
    username: ${DB_USERNAME:graph}
    password: ${DB_PASSWORD:graph}
    driver-class-name: org.postgresql.Driver

---
# Kafka profile: turns on the event-driven path (Graph publishes social.events). Off by default so
# the JDK-only / no-Docker run needs no broker. Activate with SPRING_PROFILES_ACTIVE=kafka.
spring:
  config:
    activate:
      on-profile: kafka
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Don't lose events to a leader blip: wait for all in-sync replicas and retry.
      acks: all
app:
  outbox:
    # Relay cadence and batch size for draining staged events to Kafka.
    poll-ms: ${OUTBOX_POLL_MS:1000}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    # How long the relay blocks for a broker ack before leaving a row for the next tick.
    send-timeout-ms: ${OUTBOX_SEND_TIMEOUT_MS:5000}
    # Published rows are kept this long (for debugging/audit) then purged.
    retention-hours: ${OUTBOX_RETENTION_HOURS:24}
    purge-ms: ${OUTBOX_PURGE_MS:3600000}
