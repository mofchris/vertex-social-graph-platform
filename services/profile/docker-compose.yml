services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: profile
      POSTGRES_USER: profile
      POSTGRES_PASSWORD: profile
    ports:
      - "5433:5432"   # 5433 on the host to avoid clashing with the identity DB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U profile"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  profile:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/profile
      DB_USERNAME: profile
      DB_PASSWORD: profile
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Where the Graph service lives (for FRIENDS-visibility checks). Graph runs from its
      # own compose; host.docker.internal reaches a Graph instance on the host's port 8082.
      GRAPH_BASE_URL: http://host.docker.internal:8082
      # MUST match the Identity service's APP_JWT_SECRET so tokens verify across services.
      APP_JWT_SECRET: change-me-in-prod-use-a-long-random-secret-0123456789
    ports:
      - "8081:8081"

volumes:
  pgdata:
