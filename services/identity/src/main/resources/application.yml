spring:
  application:
    name: identity
  # Default (dev) profile: in-memory H2 in PostgreSQL-compatibility mode.
  # Runs with only a JDK — no Docker or Postgres required.
  datasource:
    url: jdbc:h2:mem:identity;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    # Dev-only secret. Override in any real deployment via APP_JWT_SECRET (>= 32 bytes).
    secret: ${APP_JWT_SECRET:dev-only-secret-change-me-please-min-32-bytes-long-0123456789}
    issuer: vertex-identity
    access-ttl: PT15M
    refresh-ttl: P30D

---
# Postgres profile: used by docker-compose / prod-like runs (SPRING_PROFILES_ACTIVE=postgres).
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity}
    username: ${DB_USERNAME:identity}
    password: ${DB_PASSWORD:identity}
    driver-class-name: org.postgresql.Driver
