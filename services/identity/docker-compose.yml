services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  identity:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/identity
      DB_USERNAME: identity
      DB_PASSWORD: identity
      # Override in any real deployment. Dev-only value here.
      APP_JWT_SECRET: change-me-in-prod-use-a-long-random-secret-0123456789
    ports:
      - "8080:8080"

volumes:
  pgdata:
