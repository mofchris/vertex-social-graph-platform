server:
  # 8083 so Feed runs alongside identity (8080), profile (8081), graph (8082).
  port: 8083

spring:
  application:
    name: feed
  datasource:
    url: jdbc:h2:mem:feed;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    # MUST match the Identity service's secret so this service can verify its tokens.
    secret: ${APP_JWT_SECRET:dev-only-secret-change-me-please-min-32-bytes-long-0123456789}
    issuer: vertex-identity
  graph:
    # The Graph service, consulted for follower/following lists during fan-out.
    base-url: ${GRAPH_BASE_URL:http://localhost:8082}
  feed:
    # A user with more followers than this is treated as a "celebrity": their posts are
    # NOT fanned out on write; followers pull them on read. Low for the demo dataset.
    celebrity-threshold: ${CELEBRITY_THRESHOLD:20}

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/feed}
    username: ${DB_USERNAME:feed}
    password: ${DB_PASSWORD:feed}
    driver-class-name: org.postgresql.Driver
