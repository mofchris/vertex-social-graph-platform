# Full-platform local stack: one command boots every Vertex service against a shared Postgres,
# Redis, and a single-node Kafka (KRaft mode — no ZooKeeper). Free / $0, runs entirely on your
# machine.
#
#   docker compose up --build
#
# Ports: identity 8080 · profile 8081 · graph 8082 · feed 8083 · notify 8084 · recommend 8085.
# Seed it once everything is healthy:  bash scripts/seed-demo.sh
#
# graph and notify run the `kafka` profile, so a follow / friend event flows end-to-end:
#   Graph --(transactional outbox)--> Kafka topic social.events --> Notify (idempotent consumer).
# Everything else (identity, profile, feed) runs the `postgres` profile.

x-jwt-secret: &jwt "change-me-in-prod-use-a-long-random-secret-0123456789"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vertex
      POSTGRES_PASSWORD: vertex
      POSTGRES_DB: vertex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertex"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Single-node dev broker: one replica is all there is.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # social.events and social.events.DLT are created on first use.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  identity:
    build: ./services/identity
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/identity
      DB_USERNAME: vertex
      DB_PASSWORD: vertex
      APP_JWT_SECRET: *jwt
    ports:
      - "8080:8080"

  profile:
    build: ./services/profile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/profile
      DB_USERNAME: vertex
      DB_PASSWORD: vertex
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      GRAPH_BASE_URL: http://graph:8082
      APP_JWT_SECRET: *jwt
    ports:
      - "8081:8081"

  graph:
    build: ./services/graph
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres,kafka
      DB_URL: jdbc:postgresql://postgres:5432/graph
      DB_USERNAME: vertex
      DB_PASSWORD: vertex
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_JWT_SECRET: *jwt
    ports:
      - "8082:8082"

  feed:
    build: ./services/feed
    depends_on:
      postgres:
        condition: service_healthy
      graph:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/feed
      DB_USERNAME: vertex
      DB_PASSWORD: vertex
      GRAPH_BASE_URL: http://graph:8082
      APP_JWT_SECRET: *jwt
    ports:
      - "8083:8083"

  notify:
    build: ./services/notify
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres,kafka
      DB_URL: jdbc:postgresql://postgres:5432/notify
      DB_USERNAME: vertex
      DB_PASSWORD: vertex
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_JWT_SECRET: *jwt
    ports:
      - "8084:8084"

  recommend:
    build: ./services/recommend
    depends_on:
      graph:
        condition: service_started
    environment:
      GRAPH_BASE_URL: http://graph:8082
      APP_JWT_SECRET: *jwt
    ports:
      - "8085:8085"

volumes:
  pgdata:
