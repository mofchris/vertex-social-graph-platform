name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: backend (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [identity, profile, graph, feed, notify, recommend, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          chmod +x mvnw
          ./mvnw -B test

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        # npm install (not ci): the lockfile is generated on Windows and can't record the
        # optional deps of Linux-only native packages (@emnapi/*), so npm ci would reject it
        # on the Linux runner. npm install resolves the correct per-platform deps.
        run: npm install --no-audit --no-fund

      - name: Build (type-check + lint + compile)
        working-directory: web
        run: npm run build
